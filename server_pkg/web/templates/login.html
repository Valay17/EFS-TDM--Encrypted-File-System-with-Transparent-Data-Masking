<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EFS-TDM Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000;
      font-family: Consolas, 'Courier New', Courier, monospace;
      color: #c9d1d9;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 0 1.5rem;
    }

    .heading {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .heading h1 {
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      color: #58a6ff;
      white-space: nowrap;
    }

    .heading p {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #8b949e;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .card {
      background: #0a0a0a;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      background: #000000;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #58a6ff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.5rem;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 4px;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #2ea043;
    }

    .error {
      background: #2d1c1c;
      border: 1px solid #6e2d2d;
      border-radius: 4px;
      color: #f85149;
      font-size: 0.8rem;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1.25rem;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="heading">
      <h1>EFS-TDM</h1>
      <p>Encrypted File System &mdash; Transparent Data Masking</p>
    </div>


    <div class="card">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter Username"
            autofocus
            required
          />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter Password"
            required
          />
        </div>
        <button type="submit">Authenticate</button>
      </form>
    </div>

    <div class="footer">localhost &bull; TLS-secured backend</div>

  </div>
</body>
</html>
